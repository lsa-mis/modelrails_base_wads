name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit

  scan_js:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  lint:
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v4
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.tool-versions', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  lint_docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Install herb linter
        run: npm install -g @herb-tools/linter

      - name: Check markdown
        run: bundle exec rake markdown:check

      - name: Check ERB templates
        run: bundle exec rake erb:check

  test:
    runs-on: ubuntu-latest
    env:
      RAILS_ENV: test
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install libvips (Active Storage image variants)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libvips42t64

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Prepare database
        run: bin/rails db:prepare

      - name: Set up gem source symlinks for Tailwind
        run: bundle exec rake tailwind:setup_gem_sources

      - name: Compile assets
        run: bin/rails assets:precompile

      - name: Run tests
        run: bundle exec rspec --format progress

      - name: Upload test screenshots on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: system-test-screenshots
          path: tmp/capybara/
          retention-days: 7

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  docker_build:
    # Verify the production Dockerfile actually builds. Structural integration
    # specs catch file-content and ordering bugs, but only running an actual
    # `docker build .` catches build-time regressions like the .tool-versions
    # COPY bug from #129 (fixed in #132). See #133 for context.
    #
    # GHA cache (type=gha) keeps subsequent builds at ~30-60s wall clock by
    # reusing the apt-get, bundle install, and asset precompile layers.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build production image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: false
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: modelrails_base:ci-${{ github.sha }}
