# Lefthook git hooks — skip with LEFTHOOK=0 or --no-verify
#
# Pre-push commands set skip_empty: false so the full suite (brakeman, rspec,
# rubocop) runs on every push, including the first push of a new branch where
# no remote ref exists yet to compute push_files against. Without this,
# Lefthook's default skip_empty: true causes "no matching push files" and
# silently skips the gate — a known mode where prior project PRs bypassed
# local CI without anyone noticing.

pre-commit:
  parallel: true
  commands:
    rubocop:
      glob: "*.rb"
      run: mise exec -- bundle exec rubocop --force-exclusion --autocorrect {staged_files}
      stage_fixed: true

pre-push:
  # Sequential ordering with stop-on-first-failure. Critical because
  # `tailwind_build` rewrites app/assets/builds/tailwind.css and `rspec`'s
  # Playwright system tests load that file from the dev server. Running the
  # two in parallel produced a race window (~1-2s) where early specs read a
  # partial CSS file and axe-core reported phantom contrast violations on
  # static, members, and docs pages. Ordering tailwind_build first
  # guarantees rspec sees the freshly-built CSS deterministically.
  piped: true
  commands:
    tailwind_build:
      tags: assets
      skip_empty: false
      run: mise exec -- bin/rails tailwindcss:build
      skip:
        - merge
        - rebase
    brakeman:
      tags: security
      skip_empty: false
      run: mise exec -- bundle exec brakeman --no-pager -q
      skip:
        - merge
        - rebase
    rubocop:
      tags: style
      skip_empty: false
      run: mise exec -- bundle exec rubocop -f simple
      skip:
        - merge
        - rebase
    erb_lint:
      # Matches CI's lint_docs job. herb-lint is a pinned devDependency run via
      # `npx herb-lint` — `bin/setup` (npm ci) installs it; if you hit "command
      # not found", run `npm ci`. Catches rules that bit PR #78:
      # erb-no-output-in-attribute-position, html-no-empty-attributes, & friends.
      tags: style
      skip_empty: false
      run: mise exec -- bundle exec rake erb:check
      skip:
        - merge
        - rebase
    markdown_lint:
      # Mirrors CI's lint_docs job (`bundle exec rake markdown:check`). Was
      # absent locally until #193 caught a trailing-space MD009 violation in
      # workspaces.md — same drift pattern as PR #78's erb_lint miss
      # (see memory: project_ci_lefthook_drift). Markdownlint runs in <1s,
      # so this adds negligible push latency.
      tags: style
      skip_empty: false
      run: mise exec -- bundle exec rake markdown:check
      skip:
        - merge
        - rebase
    rspec:
      tags: test
      skip_empty: false
      env:
        CI: "true"
      run: mise exec -- bundle exec rspec
      skip:
        - merge
        - rebase
