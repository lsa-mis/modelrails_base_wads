# SQLite. Versions 3.8.0 and up are supported.
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem "sqlite3"
#
default: &default
  adapter: sqlite3
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  # `timeout` installs a Ruby-level busy handler (the sqlite3 gem's
  # busy_handler_timeout) so writers wait up to 5s for the lock. This is NOT
  # the SQLite `busy_timeout` PRAGMA — `PRAGMA busy_timeout` reads 0 on the
  # live connection even though this is set, and that's expected. Don't add a
  # `busy_timeout` pragma below: it would replace this handler. (See #304 and
  # spec/config/sqlite_pragmas_spec.rb.)
  timeout: 5000
  # Rails 8.1 already defaults journal_mode to WAL; we declare it explicitly so
  # a fork reads the production durability/concurrency posture here rather than
  # inferring it from adapter defaults. `pragmas:` MERGES over Rails'
  # DEFAULT_PRAGMAS — synchronous: normal, foreign_keys, mmap_size, cache_size
  # are still applied; we only pin the one a fork is most likely to regress.
  pragmas:
    journal_mode: wal

development:
  primary:
    <<: *default
    database: storage/development.sqlite3
  queue:
    <<: *default
    database: storage/development_queue.sqlite3
    migrations_paths: db/queue_migrate

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: storage/test.sqlite3

# Store production database in the storage/ directory, which by default
# is mounted as a persistent Docker volume in config/deploy.yml.
production:
  primary:
    <<: *default
    database: storage/production.sqlite3
  cache:
    <<: *default
    database: storage/production_cache.sqlite3
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: storage/production_queue.sqlite3
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: storage/production_cable.sqlite3
    migrations_paths: db/cable_migrate
