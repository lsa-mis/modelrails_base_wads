en:
  authentication_mailer:
    verification_email:
      subject: "Verify your email address"
      greeting: "Hi %{name},"
      body: "Please verify your email address by clicking the link below."
      action: "Verify email address"
      expiry_note: "This link will expire in 24 hours."
    password_reset_email:
      subject: "Reset your password"
      greeting: "Hi %{name},"
      body: "We received a request to reset your password. Click the link below to choose a new one."
      action: "Reset password"
      expiry_note: "This link will expire in 2 hours."
      ignore_note: "If you didn't request a password reset, you can safely ignore this email."
    email_change_verification:
      subject: "Verify your new email address"
      greeting: "Hi %{name},"
      body: "You requested to change your email address. Click the link below to verify your new address."
      action: "Verify new email"
      expiry_note: "This link will expire in 24 hours."
    email_change_notification:
      subject: "Email change requested on your account"
      greeting: "Hi %{name},"
      body: "Someone requested to change the email address on your account to %{new_email}."
      warning: "If this wasn't you, please change your password immediately."
    link_verification_email:
      subject: "Confirm your %{provider} sign-in for %{app_name}"
      greeting: "Hi %{first_name},"
      body: "You added %{provider} as a sign-in method for %{app_name}. Confirm that %{email} belongs to you to activate it."
      cta: "Yes, this was me — finish linking"
      what_is_this: "We email you whenever a new sign-in method is added to your account. This protects your account from someone else linking it."
      footer: "If you didn't try to add this, ignore this email — your account stays untouched."
      preheader: "Confirm %{email} to finish linking your sign-in method."
    collision_alert:
      subject: "Someone tried to link %{provider} to a different %{app_name} account"
      greeting: "Hi %{first_name},"
      body: "Someone just tried to use your %{provider} account to sign in to a different %{app_name} account. We blocked the attempt — your account is unaffected and your %{provider} link still points to you."
      what_to_do: "If that was you (perhaps you were trying to switch %{app_name} accounts), no action is needed. If you weren't expecting this, your %{provider} account itself may be at risk — review your %{provider} security settings and consider rotating your %{provider} password."
      cta: "Review your connected accounts"
      footer: "We send this alert when a third party attempts to attach your sign-in method elsewhere. It does not mean your %{app_name} account was compromised."
      preheader: "Someone tried to link your %{provider} sign-in to a different account."
