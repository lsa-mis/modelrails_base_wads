      body: "Your invitation to %{workspace} expires in %{hours_remaining} hours. Accept it before then to avoid having to request a new one."
      action: "Accept invitation"
    workspace_member_added:
      subject: "You've been added to %{workspace}"
      heading: "Welcome to %{workspace}"
      greeting: "Hi %{name},"
      body: "You've been added to %{workspace} as %{new_role}."
      action: "Open workspace"
    workspace_capacity_approaching:
      subject: "%{workspace} is approaching its %{metric} limit"
      heading: "%{workspace} is approaching its %{metric} limit"
      greeting: "Hi %{name},"
      body: "%{workspace} is using %{current} of %{limit} %{metric}. To avoid hitting the cap, consider upgrading your plan or reviewing existing %{metric}."
      action: "Manage workspace settings"
    sign_in_from_new_device:
      subject: "New sign-in from %{os}"
      heading: "New sign-in to your account"
      greeting: "Hi %{name},"
      body: "We noticed your account was just signed in from a browser we haven't seen before (%{os}). If this was you, no action is needed. If you didn't sign in, change your password and review your connected accounts immediately."
      action: "Review account security"
