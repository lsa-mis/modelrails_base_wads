en:
  a11y_sim:
    dev_badge: "DEV"
    prefix: "A11y:"
    heading: "A11y simulation"
    trigger_aria_label: "Toggle accessibility-simulation menu (development only)"
    menu_aria_label: "Accessibility-simulation modes"
    footer_hint: "Esc to close · 0–8 to jump"
    announcement_template: "Accessibility filter: %{mode}"
    modes:
      normal: "Normal"
      blur: "Blur"
      grayscale: "Grayscale"
      deuteranopia: "Deuteranopia"
      protanopia: "Protanopia"
      tritanopia: "Tritanopia"
      achromatopsia: "Achromatopsia"
      low_contrast: "Low contrast"
      cataract: "Cataract"
    descriptions:
      normal: "No filter — the interface as designed."
      blur: "Reduced visual acuity, as with an uncorrected refractive error."
      grayscale: "All color removed — a quick proxy for total color blindness."
      deuteranopia: "Green-blindness (no M-cone). Reds and greens become hard to tell apart."
      protanopia: "Red-blindness (no L-cone). Reds look dark and are confused with greens."
      tritanopia: "Blue-blindness (no S-cone). Blues and yellows are confused."
      achromatopsia: "Total color blindness — the interface seen only in shades of gray."
      low_contrast: "Reduced contrast sensitivity, as with low vision."
      cataract: "Clouded vision — blur plus washed-out contrast and haze."
