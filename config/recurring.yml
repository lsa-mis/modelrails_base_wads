# examples:
#   periodic_cleanup:
#     class: CleanSoftDeletedRecordsJob
#     queue: background
#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  workspace_invitation_expiring_sweep:
    class: WorkspaceInvitationExpiringSweepJob
    queue: default
    # Sweeps every 6 hours; per-day idempotency bucket means each expiring
    # invitation produces one notification per day until accepted/declined.
    schedule: every 6 hours

  workspace_capacity_sweep:
    class: WorkspaceCapacitySweepJob
    queue: default
    # 12-hour cadence balances alert freshness with noise budget;
    # idempotency-key is per-day so owners aren't double-notified.
    schedule: every 12 hours

  digest_mailer:
    class: DigestMailerJob
    queue: mailers
    # Polls every 15 minutes against the digest_next_due_at indexed range.
    # Single SELECT scan regardless of user count; per-user logic skips
    # immediately when DND or digest_enabled? blocks. Each user's individual
    # daily/weekly cadence is honored by next_due_at_in(timezone).
    #
    # Routed to the `mailers` queue (declared in queue.yml) so SMTP-bound
    # mailer work is observable separately from DB sweeps on `default`.
    schedule: every 15 minutes

  notification_cleanup:
    class: NotificationCleanupJob
    queue: default
    # Runs daily at 3am UTC. Per-user batched deletion in chunks of 100 to
    # release SQLite write lock between transactions, so cleanup never
    # blocks incoming notifications for more than ~10ms at a time.
    # Security category protected by NotificationPreferences::RETENTION_FLOORS
    # ("security" => 365.days) regardless of user preference.
    schedule: every day at 3am
